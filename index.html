function tinhSoTinChi(tenMon) {
    if (tenMon.indexOf("TN ") !== -1 || tenMon.indexOf("TN Kỹ thuật số") !== -1) return 0;
    if (tenMon.indexOf("Tín hiệu và hệ thống") !== -1) return 4;
    if (tenMon.indexOf("Kỹ thuật số") !== -1) return 4;
    if (tenMon.indexOf("PBL") !== -1) return 3;
    if (tenMon.indexOf("Anh văn chuyên ngành") !== -1) return 3;
    if (tenMon.indexOf("Chủ nghĩa Xã hội khoa học") !== -1) return 2;
    return 3;
}

function layTenNhomCon(mon) {
    var kyTuCuoi = mon.malop.slice(-1);
    if (kyTuCuoi === 'A' || kyTuCuoi === 'B') {
        return 'NHÓM ' + mon.nhom + kyTuCuoi;
    }
    return 'NHÓM ' + mon.nhom;
}

function docChuoiTKB(chuoiTkb) {
    var danhSachTkb = [];
    var cacThu = chuoiTkb.split(';');
    var tenThu = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"];

    for (var i = 0; i < cacThu.length; i++) {
        var noidung = cacThu[i];
        if (noidung && noidung.trim() !== '' && i < 6) {
            var cat = noidung.split(',');
            var tiet = cat[0];
            var phong = cat[1] || "";
            if (tiet) {
                var gio = tiet.split('-');
                var tietBatDau = parseInt(gio[0]);
                var tietKetThuc = parseInt(gio[1]);

                danhSachTkb.push({
                    thuIndex: i,
                    tietBD: tietBatDau,
                    tietKT: tietKetThuc,
                    phongHoc: phong,
                    textHienThi: tenThu[i] + " (" + tietBatDau + "-" + tietKetThuc + ") " + phong
                });
            }
        }
    }
    return danhSachTkb;
}

function rutGonTenMon(tenMon) {
    return tenMon.replace("(Blended learning)", "").trim();
}

var danhSachMonHoc = [];
for (var i = 0; i < dataGoc.length; i++) {
    var item = dataGoc[i];
    danhSachMonHoc.push({
        id: item.id,
        khoa: item.khoa,
        nhom: item.nhom,
        malop: item.malop,
        ten: item.ten,
        sl: item.sl,
        gv: item.gv,
        tkbGoc: item.tkb,
        tuan: item.tuan,
        lop: item.lop,
        stc: tinhSoTinChi(item.ten),
        chiTietTkb: docChuoiTKB(item.tkb),
        tenChuan: rutGonTenMon(item.ten)
    });
}

var listIdDaChon = [];

function kiemTraTrungLich(mon1, mon2) {
    for (var a = 0; a < mon1.chiTietTkb.length; a++) {
        for (var b = 0; b < mon2.chiTietTkb.length; b++) {
            var slot1 = mon1.chiTietTkb[a];
            var slot2 = mon2.chiTietTkb[b];

            if (slot1.thuIndex === slot2.thuIndex) {
                var maxStart = Math.max(slot1.tietBD, slot2.tietBD);
                var minEnd = Math.min(slot1.tietKT, slot2.tietKT);
                if (maxStart <= minEnd) {
                    return true;
                }
            }
        }
    }
    return false;
}

function taoKhungTKB() {
    var bodyTkb = document.getElementById('body-tkb');
    bodyTkb.innerHTML = '';

    for (var tiet = 1; tiet <= 10; tiet++) {
        var tr = document.createElement('tr');
        tr.id = 'dong-tiet-' + tiet;

        var htmlDong = '<td align="center" bgcolor="#E0E0E0"><font color="#000000"><b>Tiết ' + tiet + '</b><br><font size="1">' + gioHoc[tiet] + '</font></font></td>';
        for (var thu = 0; thu < 6; thu++) {
            htmlDong += '<td id="o-' + thu + '-' + tiet + '" align="center"></td>';
        }
        tr.innerHTML = htmlDong;
        bodyTkb.appendChild(tr);
    }
}

function renderTKB() {
    taoKhungTKB();

    var listMonDaChon = [];
    for (var i = 0; i < danhSachMonHoc.length; i++) {
        if (listIdDaChon.indexOf(danhSachMonHoc[i].id) !== -1) {
            listMonDaChon.push(danhSachMonHoc[i]);
        }
    }

    for (var i = 0; i < listMonDaChon.length; i++) {
        var mon = listMonDaChon[i];
        for (var j = 0; j < mon.chiTietTkb.length; j++) {
            var slot = mon.chiTietTkb[j];
            var oBatDau = document.getElementById('o-' + slot.thuIndex + '-' + slot.tietBD);

            if (oBatDau) {
                var soTietHop = slot.tietKT - slot.tietBD + 1;

                for (var t = slot.tietBD + 1; t <= slot.tietKT; t++) {
                    var oCuaXoa = document.getElementById('o-' + slot.thuIndex + '-' + t);
                    if (oCuaXoa) {
                        oCuaXoa.parentNode.removeChild(oCuaXoa);
                    }
                }

                oBatDau.rowSpan = soTietHop;
                
                var tenNhomHienThi = layTenNhomCon(mon);
                var phongHienThi = slot.phongHoc || 'N/A';

                oBatDau.innerHTML = '<div class="the-mon-hoc nhom-' + mon.nhom + '">' +
                    '<b>' + mon.ten + '</b><br>' +
                    '<span>' + tenNhomHienThi + '</span><br>' +
                    '<span>GV: ' + mon.gv + '</span><br>' +
                    '<span>' + phongHienThi + '</span>' +
                    '</div>';
            }
        }
    }
}

function renderDanhSachMon() {
    var bodyDanhSach = document.getElementById('body-danh-sach');
    bodyDanhSach.innerHTML = '';

    var tongTC = 0;
    var listMonDaChon = [];
    for (var i = 0; i < danhSachMonHoc.length; i++) {
        if (listIdDaChon.indexOf(danhSachMonHoc[i].id) !== -1) {
            listMonDaChon.push(danhSachMonHoc[i]);
            tongTC += danhSachMonHoc[i].stc;
        }
    }
    document.getElementById('tong-tc').innerText = tongTC;

    var currentNhom = null;

    for (var i = 0; i < danhSachMonHoc.length; i++) {
        var mon = danhSachMonHoc[i];

        if (mon.nhom !== currentNhom) {
            currentNhom = mon.nhom;
            var trNhom = document.createElement('tr');
            trNhom.className = 'header-nhom';
            trNhom.innerHTML = '<td colspan="7" align="center">NHÓM ' + currentNhom + '</td>';
            bodyDanhSach.appendChild(trNhom);
        }

        var tr = document.createElement('tr');

        var isDaChon = listIdDaChon.indexOf(mon.id) !== -1;
        var isTrungTen = false;
        var isTrungGio = false;

        for (var k = 0; k < listMonDaChon.length; k++) {
            var monSelected = listMonDaChon[k];
            if (monSelected.id !== mon.id) {
                if (monSelected.tenChuan === mon.tenChuan) {
                    isTrungTen = true;
                }
                if (kiemTraTrungLich(monSelected, mon)) {
                    isTrungGio = true;
                }
            }
        }

        if (isDaChon) {
            tr.className = 'mon-da-chon';
        } else if (isTrungTen || isTrungGio) {
            tr.className = 'mon-bi-khoa';
        } else {
            tr.className = 'mon-nhom-' + mon.nhom;
        }

        var textTkb = '';
        for (var m = 0; m < mon.chiTietTkb.length; m++) {
            textTkb += mon.chiTietTkb[m].textHienThi + '<br>';
        }

        var isChecked = isDaChon ? 'checked' : '';

        tr.innerHTML = '<td align="center">' +
            '<input type="checkbox" ' + isChecked + ' onchange="clickChonMon(' + mon.id + ')">' +
            '</td>' +
            '<td><font color="#000000">' + mon.ten + '</font></td>' +
            '<td><font size="2" color="#000000">' + mon.malop + '</font></td>' +
            '<td align="center"><font color="#000000"><b>' + mon.nhom + '</b></font></td>' +
            '<td><font color="#000000">' + mon.gv + '</font></td>' +
            '<td align="center"><font color="#000000">' + mon.stc + '</font></td>' +
            '<td><font size="1" color="#000000">' + (textTkb || '-') + '</font></td>';

        bodyDanhSach.appendChild(tr);
    }
}

function clickChonMon(idMon) {
    var index = listIdDaChon.indexOf(idMon);
    if (index !== -1) {
        listIdDaChon.splice(index, 1);
    } else {
        listIdDaChon.push(idMon);
    }

    renderDanhSachMon();
    renderTKB();
}

var paymentInterval = null;
var countdownInterval = null;

function openFeaturesModal() { 
    document.getElementById("viewFeatures").style.display = "block"; 
    document.getElementById("viewPayment").style.display = "none"; 
    document.getElementById("paymentModal").style.display = "flex"; 
}

function closePaymentModal() { 
    document.getElementById("paymentModal").style.display = "none"; 
    stopTimers(); 
}

function backToFeatures() { 
    document.getElementById("viewFeatures").style.display = "block"; 
    document.getElementById("viewPayment").style.display = "none"; 
    stopTimers(); 
}

function stopTimers() { 
    if (paymentInterval) clearInterval(paymentInterval); 
    if (countdownInterval) clearInterval(countdownInterval); 
}

function goToPaymentMethods() {
    document.getElementById("viewFeatures").style.display = "none";
    document.getElementById("viewPayment").style.display = "block";
    var urlVietQr = "https://img.vietqr.io/image/ICB-0969435625-compact2.png?amount=100000&addInfo=" + encodeURIComponent("DANG KY VDUT PREMIUM") + "&accountName=" + encodeURIComponent("PHAN LE THANH VINH");
    document.getElementById("imgVietQR").src = urlVietQr;
    startCheckingPayment("100000", "VDUT PREMIUM");
    startCountdownTimer(600);
}

function startCountdownTimer(seconds) {
    var timerDisplay = document.getElementById("paymentCountdown");
    countdownInterval = setInterval(function() {
        seconds--;
        var mins = Math.floor(seconds / 60); 
        var secs = seconds % 60;
        timerDisplay.innerText = "Thời gian thanh toán còn lại: " + (mins < 10 ? "0" : "") + mins + ":" + (secs < 10 ? "0" : "") + secs;
        if (seconds <= 0) { 
            clearInterval(countdownInterval); 
            closePaymentModal(); 
        }
    }, 1000);
}

function startCheckingPayment(amount, description) {
    paymentInterval = setInterval(function() {
        var xhr = new XMLHttpRequest();
        xhr.open("GET", "https://oauth.casso.vn/v2/transactions?pageSize=5&sort=DESC", true);
        xhr.setRequestHeader("Authorization", "Apikey KHONG_GHI_CHU_XOA_SACH_MA_API_KEY_CUA_BAN_TAI_DAY");
        xhr.setRequestHeader("Content-Type", "application/json");
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                var res = JSON.parse(xhr.responseText);
                if (res && res.data && res.data.records) {
                    for (var i = 0; i < res.data.records.length; i++) {
                        if (res.data.records[i].amount >= parseInt(amount) && res.data.records[i].description.toUpperCase().indexOf(description.toUpperCase()) !== -1) {
                            clearInterval(paymentInterval);
                            alert("Kích hoạt Premium thành công!");
                            closePaymentModal();
                            break;
                        }
                    }
                }
            }
        };
        xhr.send();
    }, 3000);
}

function handleCardNumberInput(input) {
    var value = input.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');
    var parts = []; 
    for (var i = 0; i < value.length; i += 4) { 
        parts.push(value.substring(i, i + 4)); 
    }
    input.value = parts.join(' ');
    document.getElementById("logoVisa").classList.remove("active"); 
    document.getElementById("logoMastercard").classList.remove("active");
    if (value.indexOf('4') === 0) document.getElementById("logoVisa").classList.add("active");
    else if (value.indexOf('5') === 0) document.getElementById("logoMastercard").classList.add("active");
}

function handleCardExpiryInput(input) {
    var value = input.value.replace(/\s+/g, '').replace(/[^0-9]/g, '');
    input.value = value.length >= 2 ? value.substring(0, 2) + '/' + value.substring(2, 4) : value;
}

function checkLuhn(cardNumber) {
    var cleanNumber = cardNumber.replace(/\s+/g, ''); 
    if (cleanNumber.length < 13) return false;
    var sum = 0; 
    var shouldDouble = false;
    for (var i = cleanNumber.length - 1; i >= 0; i--) {
        var digit = parseInt(cleanNumber.charAt(i));
        if (shouldDouble) { digit *= 2; if (digit > 9) digit -= 9; }
        sum += digit; 
        shouldDouble = !shouldDouble;
    }
    return (sum % 10 === 0);
}

function validateAndPayCard(event) { 
    event.preventDefault(); 
    if (!checkLuhn(document.getElementById("cardNumberInput").value)) { 
        alert("Số thẻ không hợp lệ!"); 
        return; 
    } 
    alert("Cảm ơn bạn! Hệ thống đang xử lý giao dịch thẻ."); 
}

function switchTab(tab) {
    var keys = ['qr', 'card'];
    var ids = { qr: { btn: 'btnTabQr', content: 'contentQr' }, card: { btn: 'btnTabCard', content: 'contentCard' } };
    for (var i = 0; i < keys.length; i++) {
        if (keys[i] === tab) { 
            document.getElementById(ids[keys[i]].btn).classList.add("active"); 
            document.getElementById(ids[keys[i]].content).classList.add("active"); 
        } else { 
            document.getElementById(ids[keys[i]].btn).classList.remove("active"); 
            document.getElementById(ids[keys[i]].content).classList.remove("active"); 
        }
    }
}

window.onclick = function(event) { 
    if (event.target == document.getElementById("paymentModal")) closePaymentModal(); 
}

renderDanhSachMon();
renderTKB();
