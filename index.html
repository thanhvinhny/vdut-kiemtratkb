<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TẠO THỜI KHÓA BIỂU</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #ffffff;
            color: #000000;
            margin: 10px;
            font-size: 13px;
        }

        h2 {
            text-align: center;
            color: #000000;
            margin: 5px 0 15px 0;
            text-transform: uppercase;
        }

        .khu-vuc-nhap-data {
            border: 1px solid #000000;
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 15px;
        }

        .khu-vuc-nhap-data label {
            font-weight: bold;
            font-size: 13px;
        }

        .khu-vuc-nhap-data textarea {
            width: 100%;
            height: 120px;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            margin-top: 6px;
            resize: vertical;
        }

        .btn-xuly-paste {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .btn-xuly-paste:hover {
            background-color: #333333;
        }

        table.bang-tkb {
            width: 100%;
            border-collapse: collapse;
        }

        table.bang-tkb tr {
            height: 38px;
        }

        table.bang-tkb td {
            height: 1px;
            padding: 0 !important;
            margin: 0 !important;
            vertical-align: top;
        }

        .the-mon-hoc {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            text-align: center;
            padding: 2px;
            font-weight: bold;
            color: #000000;
        }

        .cum-nut-goc-phai {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            z-index: 999;
        }

        .btn-quay-lai, .btn-huong-dan {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-quay-lai:hover, .btn-huong-dan:hover {
            background-color: #ffffff;
            color: #000000;
        }

        .modal-huong-dan {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.6);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content-hd {
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 8px;
            padding: 20px;
            width: 95%;
            max-width: 1100px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            position: relative;
            box-sizing: border-box;
        }

        .close-modal-hd {
            position: absolute;
            top: 10px;
            right: 18px;
            font-size: 2rem;
            font-weight: 700;
            cursor: pointer;
            line-height: 1;
        }

        .img-huong-dan {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
            margin-top: 12px;
            display: block;
        }

        .text-huong-dan {
            font-weight: bold;
            font-size: 16px;
            margin-top: 5px;
            color: #000000;
        }

        .btn-truy-cap-dut {
            display: inline-block;
            margin-top: 10px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 8px 16px;
            font-size: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .btn-truy-cap-dut:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <h2>TẠO THỜI KHÓA BIỂU</h2>

    <div class="khu-vuc-nhap-data">
        <label>Ctrl + V vào đây:</label>
        <textarea id="inputPasteData" placeholder="Ctrl + V vào đây"></textarea>
        <button class="btn-xuly-paste" onclick="xuLyParseVaVeTKB()">TẠO THỜI KHÓA BIỂU</button>
    </div>

    <div style="width: 100%;">
        <table class="bang-tkb" border="1" cellpadding="0" cellspacing="0" width="100%" bgcolor="#FFFFFF" bordercolor="#000000">
            <thead>
                <tr bgcolor="#E0E0E0" style="height: 25px;">
                    <th width="20%">TKB</th>
                    <th width="13%">Thứ 2</th>
                    <th width="13%">Thứ 3</th>
                    <th width="13%">Thứ 4</th>
                    <th width="13%">Thứ 5</th>
                    <th width="13%">Thứ 6</th>
                    <th width="15%">Thứ 7</th>
                </tr>
            </thead>
            <tbody id="body-tkb-pasted"></tbody>
        </table>
    </div>

    <div class="cum-nut-goc-phai">
        <button class="btn-huong-dan" onclick="openHuongDanModal()">HƯỚNG DẪN SỬ DỤNG</button>
        <a href="index.html" class="btn-quay-lai">QUAY LẠI</a>
    </div>

    <div class="modal-huong-dan" id="huongDanModal">
        <div class="modal-content-hd">
            <span class="close-modal-hd" onclick="closeHuongDanModal()">&times;</span>
            <div class="text-huong-dan">COPY NHỮNG THÔNG TIN NHƯ ẢNH</div>
            <div>
                <a href="https://dangkytinchi.dut.udn.vn/" target="_blank" class="btn-truy-cap-dut">TRUY CẬP TRANG ĐĂNG KÝ TÍN CHỈ - DUT</a>
            </div>
            <img src="A.png" alt="Hướng dẫn" class="img-huong-dan">
        </div>
    </div>

    <script src="data.js"></script>
    <script src="magv.js"></script>
    <script src="giangvien.js"></script>

<script>
var gioHoc = {
    1: "7h00 - 7h50", 2: "8h00 - 8h50", 3: "9h00 - 9h50", 4: "10h00 - 10h50", 5: "11h00 - 11h50",
    6: "12h30 - 13h20", 7: "13h30 - 14h20", 8: "14h30 - 15h20", 9: "15h30 - 16h20", 10: "16h30 - 17h20"
};

var mauTkbPastel = ['#fecaca', '#fed7aa', '#fef08a', '#bbf7d0', '#bae6fd', '#ddd6fe', '#f5d0fe'];

function getMauNhomTkb(nhomNum) {
    var index = Math.abs(parseInt(nhomNum) || 0) % mauTkbPastel.length;
    return mauTkbPastel[index];
}

function openHuongDanModal() {
    document.getElementById("huongDanModal").style.display = "flex";
}

function closeHuongDanModal() {
    document.getElementById("huongDanModal").style.display = "none";
}

window.onclick = function(event) {
    var modal = document.getElementById("huongDanModal");
    if (event.target == modal) {
        closeHuongDanModal();
    }
}

function taoKhungTKB() {
    var bodyTkb = document.getElementById("body-tkb-pasted");
    bodyTkb.innerHTML = '';
    for (var tiet = 1; tiet <= 10; tiet++) {
        var tr = document.createElement('tr');
        var htmlDong = '<td align="center" bgcolor="#E0E0E0"><font color="#000000"><b>Tiết ' + tiet + '</b><br><font size="1">' + gioHoc[tiet] + '</font></font></td>';
        for (var thu = 0; thu < 6; thu++) {
            htmlDong += '<td id="o-' + thu + '-' + tiet + '" align="center"></td>';
        }
        tr.innerHTML = htmlDong;
        bodyTkb.appendChild(tr);
    }
}

function timThongTinInDatabase(maLopHp) {
    if (typeof dataGoc !== 'undefined' && Array.isArray(dataGoc)) {
        for (var i = 0; i < dataGoc.length; i++) {
            if (dataGoc[i].malop === maLopHp) {
                var tenGV = dataGoc[i].gv;
                if (typeof mapMaGV !== 'undefined' && mapMaGV[dataGoc[i].gv]) {
                    tenGV = mapMaGV[dataGoc[i].gv];
                } else if (typeof mapGiangVien !== 'undefined' && mapGiangVien[dataGoc[i].malop]) {
                    tenGV = mapGiangVien[dataGoc[i].malop];
                }
                return {
                    ten: dataGoc[i].ten,
                    gv: tenGV,
                    nhom: dataGoc[i].nhom
                };
            }
        }
    }
    return null;
}

function xuLyParseVaVeTKB() {
    var rawText = document.getElementById("inputPasteData").value.trim();
    if (!rawText) {
        alert("Vui lòng dán dữ liệu Đăng ký học phần vào ô trước!");
        return;
    }

    taoKhungTKB();

    var tenThuMap = {
        "Thứ 2": 0, "Thứ 3": 1, "Thứ 4": 2, "Thứ 5": 3, "Thứ 6": 4, "Thứ 7": 5
    };

    var codeRegex = /(\d{6,10}\.\d{4}\.\d{2}\.[A-Za-z0-9]+)/g;
    var matches = [];
    var match;

    while ((match = codeRegex.exec(rawText)) !== null) {
        matches.push({
            code: match[1],
            index: match.index
        });
    }

    if (matches.length === 0) {
        alert("Không nhận diện được lịch học! Vui lòng dán đúng bảng Đăng ký học phần.");
        return;
    }

    var dsMonParse = [];

    for (var i = 0; i < matches.length; i++) {
        var startIdx = matches[i].index;
        var endIdx = (i + 1 < matches.length) ? matches[i + 1].index : rawText.length;
        var blockText = rawText.substring(startIdx, endIdx);
        var maLopHp = matches[i].code;

        var arrP = maLopHp.split('.');
        var nhom = arrP[arrP.length - 1] || "1";

        var dbInfo = timThongTinInDatabase(maLopHp);
        var tenMon = dbInfo ? dbInfo.ten : "";
        var giangVien = dbInfo ? dbInfo.gv : "";

        if (!tenMon || !giangVien) {
            var lines = blockText.split(/[\n\r]+/);
            for (var l = 0; l < lines.length; l++) {
                var lineClean = lines[l].trim();
                if (lineClean && lineClean.indexOf(maLopHp) === -1 && !lineClean.match(/^Thứ\s*[2-7]/i) && !lineClean.match(/^\d+$/)) {
                    if (!tenMon) {
                        tenMon = lineClean.replace(/^\d+\s*/, '');
                    } else if (!giangVien) {
                        giangVien = lineClean.replace(/\s*Thứ.*$/, '').replace(/^\d+\s*/, '');
                    }
                }
            }
        }

        var tkbRegex = /(Thứ\s*[2-7])\s*:\s*(\d+)-(\d+)\s*,\s*([^\s\t\r\n\,]+)/gi;
        var tkbMatch;

        while ((tkbMatch = tkbRegex.exec(blockText)) !== null) {
            var thuStr = tkbMatch[1].replace(/\s+/g, ' ').trim();
            var tietBD = parseInt(tkbMatch[2]);
            var tietKT = parseInt(tkbMatch[3]);
            var phong = tkbMatch[4].trim().replace(/-1\d{1,2}.*$/g, '');

            if (tenThuMap[thuStr] !== undefined) {
                dsMonParse.push({
                    maLopHp: maLopHp,
                    tenMon: tenMon || maLopHp,
                    nhom: nhom,
                    gv: giangVien || "",
                    thuIndex: tenThuMap[thuStr],
                    tietBD: tietBD,
                    tietKT: tietKT,
                    phong: phong
                });
            }
        }
    }

    if (dsMonParse.length === 0) {
        alert("Không nhận diện được lịch học! Vui lòng dán đúng bảng Đăng ký học phần.");
        return;
    }

    for (var k = 0; k < dsMonParse.length; k++) {
        var item = dsMonParse[k];
        var oBatDau = document.getElementById('o-' + item.thuIndex + '-' + item.tietBD);
        if (oBatDau) {
            var soTietHop = item.tietKT - item.tietBD + 1;
            for (var t = item.tietBD + 1; t <= item.tietKT; t++) {
                var oCuaXoa = document.getElementById('o-' + item.thuIndex + '-' + t);
                if (oCuaXoa) oCuaXoa.parentNode.removeChild(oCuaXoa);
            }
            oBatDau.rowSpan = soTietHop;

            var mauNhom = getMauNhomTkb(item.nhom);
            oBatDau.innerHTML = '<div class="the-mon-hoc" style="background-color: ' + mauNhom + ';">' +
                '<b>' + item.tenMon + '</b><br>' +
                '<span>NHÓM ' + item.nhom + '</span><br>' +
                (item.gv ? '<span>GV: ' + item.gv + '</span><br>' : '') +
                '<span>' + item.phong + '</span>' +
                '</div>';
        }
    }
}

taoKhungTKB();
</script>

</body>
</html>
