function getCredits(name) {
    if (name.includes("(1TC)")) return 1;
    if (name.includes("PBL")) return 2;
    if (name.includes("Chủ nghĩa Xã hội khoa học")) return 2;
    if (name.includes("Anh văn chuyên ngành")) return 2;
    return 3;
}

function parseTKB(tkbStr) {
    const days = tkbStr.split(';');
    const slots = [];
    const dayNames = ["Thứ 2", "Thứ 3", "Thứ 4", "Thứ 5", "Thứ 6", "Thứ 7"];

    days.forEach((dayContent, index) => {
        if (dayContent && dayContent.trim() !== '' && index < 6) {
            const parts = dayContent.split(',');
            const timeRange = parts[0];
            const room = parts[1] || "";
            if (timeRange) {
                const [start, end] = timeRange.split('-').map(Number);
                slots.push({
                    dayIndex: index,
                    dayName: dayNames[index],
                    start: start,
                    end: end,
                    room: room,
                    rawText: `${dayNames[index]} (${start}-${end}) ${room}`
                });
            }
        }
    });
    return slots;
}

function normalizeCourseName(name) {
    return name.replace(/\(Blended learning\)/g, '').trim();
}

const courses = rawData.map(c => ({
    ...c,
    stc: getCredits(c.ten),
    parsedTkb: parseTKB(c.tkb),
    cleanName: normalizeCourseName(c.ten)
}));

let registeredIds = new Set();

function isTimeConflict(c1, c2) {
    for (let s1 of c1.parsedTkb) {
        for (let s2 of c2.parsedTkb) {
            if (s1.dayIndex === s2.dayIndex) {
                if (Math.max(s1.start, s2.start) <= Math.min(s1.end, s2.end)) return true;
            }
        }
    }
    return false;
}

// KHỞI TẠO LƯỚI TKB VỚI GIỜ TIẾT
function initTimetableGrid() {
    const tbody = document.getElementById('timetable-body');
    tbody.innerHTML = '';
    for (let tiet = 1; tiet <= 10; tiet++) {
        const tr = document.createElement('tr');
        tr.id = `row-tiet-${tiet}`;
        
        let html = `<td align="center" bgcolor="#E0E0E0"><font color="#000000"><b>Tiết ${tiet}</b><br><font size="1">${timeSlots[tiet]}</font></font></td>`;
        for (let day = 0; day < 6; day++) {
            html += `<td id="cell-${day}-${tiet}" align="center"></td>`;
        }
        tr.innerHTML = html;
        tbody.appendChild(tr);
    }
}


function renderTimetableEvents() {
    initTimetableGrid();

    const registeredCourses = courses.filter(c => registeredIds.has(c.id));

    registeredCourses.forEach(course => {
        course.parsedTkb.forEach(slot => {
            const startCell = document.getElementById(`cell-${slot.dayIndex}-${slot.start}`);
            if (startCell) {
                const rowspan = slot.end - slot.start + 1;
                
                for (let t = slot.start + 1; t <= slot.end; t++) {
                    const toRemove = document.getElementById(`cell-${slot.dayIndex}-${t}`);
                    if (toRemove) toRemove.remove();
                }

                startCell.rowSpan = rowspan;
                startCell.innerHTML = `
                    <div class="event-box">
                        <b>${course.ten}</b><br>
                        <font color="#000000">${course.malop}</font><br>
                        <font color="#000000">P: ${slot.room || 'N/A'}</font>
                    </div>
                `;
            }
        });
    });
}


function renderCourseList() {
    const tbody = document.getElementById('course-list');
    tbody.innerHTML = '';

    const registeredCourses = courses.filter(c => registeredIds.has(c.id));

    const totalCredits = registeredCourses.reduce((sum, c) => sum + c.stc, 0);
    document.getElementById('total-credits').innerText = totalCredits;

    courses.forEach(course => {
        const tr = document.createElement('tr');
        
        const isRegistered = registeredIds.has(course.id);
        const isSameName = registeredCourses.some(rc => rc.cleanName === course.cleanName && rc.id !== course.id);
        const isConflict = registeredCourses.some(rc => rc.id !== course.id && isTimeConflict(rc, course));

        if (isRegistered) {
            tr.className = 'registered';
        } else if (isSameName || isConflict) {
            tr.className = 'disabled';
        }

        const tkbText = course.parsedTkb.map(s => s.rawText).join('<br>');

        tr.innerHTML = `
            <td align="center">
                <input type="checkbox" 
                    ${isRegistered ? 'checked' : ''} 
                    onchange="toggleRegister(${course.id})">
            </td>
            <td><font color="#000000">${course.ten}</font></td>
            <td><font size="2" color="#000000">${course.malop}</font></td>
            <td align="center"><font color="#000000">${course.nhom}</font></td>
            <td align="center"><font color="#000000">${course.stc}</font></td>
            <td><font size="1" color="#000000">${tkbText || '-'}</font></td>
        `;

        tbody.appendChild(tr);
    });
}

function toggleRegister(id) {
    if (registeredIds.has(id)) {
        registeredIds.delete(id);
    } else {
        registeredIds.add(id);
    }
    renderCourseList();
    renderTimetableEvents();
}

renderCourseList();
renderTimetableEvents();
