<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TẠO THỜI KHÓA BIỂU AUTOMATIC - VDUT</title>
    <style>
        body {
            font-family: "Times New Roman", Times, serif;
            background-color: #ffffff;
            color: #000000;
            margin: 10px;
            font-size: 13px;
        }

        h2 {
            text-align: center;
            color: #000000;
            margin: 5px 0 15px 0;
            text-transform: uppercase;
        }

        .khu-vuc-nhap-data {
            border: 1px solid #000000;
            background: #f9f9f9;
            padding: 12px;
            margin-bottom: 15px;
        }

        .khu-vuc-nhap-data label {
            font-weight: bold;
            font-size: 13px;
        }

        .khu-vuc-nhap-data textarea {
            width: 100%;
            height: 120px;
            font-family: monospace;
            font-size: 12px;
            padding: 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            margin-top: 6px;
            resize: vertical;
        }

        .btn-xuly-paste {
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .btn-xuly-paste:hover {
            background-color: #333333;
        }

        table.bang-tkb {
            width: 100%;
            border-collapse: collapse;
        }

        table.bang-tkb tr {
            height: 38px;
        }

        table.bang-tkb td {
            height: 1px;
            padding: 0 !important;
            margin: 0 !important;
            vertical-align: top;
        }

        .the-mon-hoc {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 11px;
            text-align: center;
            padding: 2px;
            font-weight: bold;
            color: #000000;
        }

        .btn-quay-lai {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            text-decoration: none;
            z-index: 999;
        }

        .btn-quay-lai:hover {
            background-color: #ffffff;
            color: #000000;
        }
    </style>
</head>
<body>

    <h2>TẠO THỜI KHÓA BIỂU TỰ ĐỘNG</h2>

    <div class="khu-vuc-nhap-data">
        <label>Dán bảng Đăng ký học phần (Ctrl+V vào đây):</label>
        <textarea id="inputPasteData" placeholder="Copy toàn bộ bảng các lớp đã đăng ký thành công dán vào đây..."></textarea>
        <button class="btn-xuly-paste" onclick="xuLyParseVaVeTKB()">VẼ THỜI KHÓA BIỂU</button>
    </div>

    <div style="width: 100%;">
        <table class="bang-tkb" border="1" cellpadding="0" cellspacing="0" width="100%" bgcolor="#FFFFFF" bordercolor="#000000">
            <thead>
                <tr bgcolor="#E0E0E0" style="height: 25px;">
                    <th width="20%">Tiết / Giờ</th>
                    <th width="13%">Thứ 2</th>
                    <th width="13%">Thứ 3</th>
                    <th width="13%">Thứ 4</th>
                    <th width="13%">Thứ 5</th>
                    <th width="13%">Thứ 6</th>
                    <th width="15%">Thứ 7</th>
                </tr>
            </thead>
            <tbody id="body-tkb-pasted"></tbody>
        </table>
    </div>

    <a href="index.html" class="btn-quay-lai">QUAY LẠI CHỌN MÔN</a>

<script>
var gioHoc = {
    1: "7h00 - 7h50", 2: "8h00 - 8h50", 3: "9h00 - 9h50", 4: "10h00 - 10h50", 5: "11h00 - 11h50",
    6: "12h30 - 13h20", 7: "13h30 - 14h20", 8: "14h30 - 15h20", 9: "15h30 - 16h20", 10: "16h30 - 17h20"
};

var mauTkbPastel = ['#fecaca', '#fed7aa', '#fef08a', '#bbf7d0', '#bae6fd', '#ddd6fe', '#f5d0fe'];

function getMauNhomTkb(nhomNum) {
    var index = Math.abs(parseInt(nhomNum) || 0) % mauTkbPastel.length;
    return mauTkbPastel[index];
}

function taoKhungTKB() {
    var bodyTkb = document.getElementById("body-tkb-pasted");
    bodyTkb.innerHTML = '';
    for (var tiet = 1; tiet <= 10; tiet++) {
        var tr = document.createElement('tr');
        var htmlDong = '<td align="center" bgcolor="#E0E0E0"><font color="#000000"><b>Tiết ' + tiet + '</b><br><font size="1">' + gioHoc[tiet] + '</font></font></td>';
        for (var thu = 0; thu < 6; thu++) {
            htmlDong += '<td id="o-' + thu + '-' + tiet + '" align="center"></td>';
        }
        tr.innerHTML = htmlDong;
        bodyTkb.appendChild(tr);
    }
}

function xuLyParseVaVeTKB() {
    var rawText = document.getElementById("inputPasteData").value.trim();
    if (!rawText) {
        alert("Vui lòng dán dữ liệu Đăng ký học phần vào ô trước!");
        return;
    }

    taoKhungTKB();

    var tenThuMap = {
        "Thứ 2": 0, "Thứ 3": 1, "Thứ 4": 2, "Thứ 5": 3, "Thứ 6": 4, "Thứ 7": 5
    };

    var pattern = /(\d{8,15}\.\d+[\.\w]*)(.+?)(Thứ\s*[2-7]:\s*\d+-\d+,[^\s]+)/gi;
    var match;
    var dsMonParse = [];

    while ((match = pattern.exec(rawText)) !== null) {
        var maLopHp = match[1].trim();
        var middleText = match[2].trim();
        var chuoiTkb = match[3].trim();

        var arrP = maLopHp.split('.');
        var nhom = arrP[arrP.length - 1] || "1";

        var giangVien = "";
        var tenMon = middleText;

        var gvMatches = middleText.match(/([A-ZÀÁẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬĐÈÉẺẼẸÊẾỀỂỄỆÌÍỈĨỊÒÓỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÙÚỦŨỤƯỨỪỬỮỰỲÝỶỸỴ][a-zàáảãạăắằẳẵặâấầnẩẫậđèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵ]+(?:\s+[A-ZÀÁẢÃẠĂẮẰẲẴẶÂẤẦẨẪẬĐÈÉẺẼẸÊẾỀỂỄỆÌÍỈĨỊÒÓỎÕỌÔỐỒỔỖỘƠỚỜỞỠỢÙÚỦŨỤƯỨỪỬỮỰỲÝỶỸỴ][a-zàáảãạăắằẳẵặâấầnẩẫậđèéẻẽẹêếềểễệìíỉĩịòóỏõọôốồổỗộơớờởỡợùúủũụưứừửữựỳýỷỹỵ]+)+)/g);
        
        if (gvMatches && gvMatches.length > 0) {
            giangVien = gvMatches[gvMatches.length - 1];
            var posGV = middleText.lastIndexOf(giangVien);
            tenMon = middleText.substring(0, posGV).trim();
        }

        tenMon = tenMon.replace(/^\d+/, '').trim();

        var matchTkb = chuoiTkb.match(/(Thứ\s*[2-7]):\s*(\d+)-(\d+),([^\s]+)/i);
        if (matchTkb) {
            var thuStr = matchTkb[1].trim();
            var tietBD = parseInt(matchTkb[2]);
            var tietKT = parseInt(matchTkb[3]);
            var phong = matchTkb[4].trim();

            phong = phong.replace(/-1\d{1,2}.*$/g, '').trim();

            if (tenThuMap[thuStr] !== undefined) {
                dsMonParse.push({
                    maLopHp: maLopHp,
                    tenMon: tenMon,
                    nhom: nhom,
                    gv: giangVien,
                    thuIndex: tenThuMap[thuStr],
                    tietBD: tietBD,
                    tietKT: tietKT,
                    phong: phong
                });
            }
        }
    }

    if (dsMonParse.length === 0) {
        alert("Không nhận diện được lịch học! Vui lòng dán đúng bảng Đăng ký học phần.");
        return;
    }

    for (var i = 0; i < dsMonParse.length; i++) {
        var item = dsMonParse[i];
        var oBatDau = document.getElementById('o-' + item.thuIndex + '-' + item.tietBD);
        if (oBatDau) {
            var soTietHop = item.tietKT - item.tietBD + 1;
            for (var t = item.tietBD + 1; t <= item.tietKT; t++) {
                var oCuaXoa = document.getElementById('o-' + item.thuIndex + '-' + t);
                if (oCuaXoa) oCuaXoa.parentNode.removeChild(oCuaXoa);
            }
            oBatDau.rowSpan = soTietHop;

            var mauNhom = getMauNhomTkb(item.nhom);
            oBatDau.innerHTML = '<div class="the-mon-hoc" style="background-color: ' + mauNhom + ';">' +
                '<b>' + item.tenMon + '</b><br>' +
                '<span>NHÓM ' + item.nhom + '</span><br>' +
                '<span>GV: ' + item.gv + '</span><br>' +
                '<span>' + item.phong + '</span>' +
                '</div>';
        }
    }
}

taoKhungTKB();
</script>

</body>
</html>
